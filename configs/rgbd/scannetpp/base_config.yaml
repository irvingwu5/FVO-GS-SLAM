# ============================================================
# Results Configuration
# ============================================================
Results:
  save_results: True
  save_dir: "scannetpp_results"
  save_trj: True
  save_trj_kf_intv: 20 #20->40
  use_gui: True
  eval_rendering: False
  use_wandb: False

# ============================================================
# Dataset Configuration
# ============================================================
Dataset:
  type: 'scannetpp'
  sensor_type: 'depth'
  pcd_downsample: 64 #其他阶段下采样因子，保留1/64%点云
  pcd_downsample_init: 32 #初始阶段下采样因子
  adaptive_pointsize: True #点大小乘中值深度得到场景中点的实际大小，限制最小为0.05
  point_size: 0.05 # 影响scales的初始化
  Calibration:
    fx: 1427.94375 #190.3925
    fy: 1427.94375 #190.3925
    cx: 960.0 #127.1969
    cy: 720.0 #96.4810
    k1: 0.0
    k2: 0.0
    p1: 0.0
    p2: 0.0
    k3: 0.0
    width: 1920 #256
    height: 1440 #192
    depth_scale: 1000.0
    distorted: False

# ============================================================
# Training Configuration
# ============================================================
Training:
  # ===== Initialization Parameters =====
  init_itr_num: 1050 # 首帧初始化时优化的迭代次数
  init_gaussian_update: 100 #每隔多少次进行一次gs密化和修剪
  init_gaussian_reset: 500 #当总迭代次数iter_count达到该值时，把gs不透明度重置为0.01
  init_gaussian_th: 0.005 #该值设置必须小于0.01，由于reset opacity为0.01<0.02，则全员gs被剪枝，0.005->0.02
  init_gaussian_extent: 30 #对densify的影响:值越大倾向于clone,值越小倾向于split,对prune的影响:值越大浮空伪影无法被剔除，值越小容易过度剔除，背景空洞

  # ===== Tracking Parameters =====
  tracking_itr_num: 100 #每帧跟踪优化的迭代次数

  # ===== Mapping Parameters =====
  mapping_itr_num: 150 #建图阶段每处理一个新关键帧时的优化迭代次数150->4dtam 5
  gaussian_update_every: 150 #每隔多少次进行一次gs密化和修剪,
  gaussian_update_offset: 50 #当总迭代次数为50、50+150、50+2*150、50+3*150...时进行gs密化和修剪
  gaussian_th: 0.7 #0.7->4dtam 0.4 控制高斯点的不透明度下限，小于该值的gs会被剔除
  gaussian_extent: 1.0 #4dtam 30.0 #gs的scaling>该值*camera_extent*0.1时被剔除
  gaussian_reset: 2001 #当总迭代次数iter_count达到该值时，把gs不透明度重置为0.01
  size_threshold: 20 #20->50, 如果max_radii2d(好像全0)>投影gs尺寸阈值，则被剔除

  # ===== Keyframe Parameters =====
  kf_interval: 4 #4->5，创建关键帧的间隔帧数
  kf_translation: 0.04
  kf_min_translation: 0.02 #0.02->4dtam 0.05
  kf_overlap: 0.95 #0.95->4dtam 0.9
  kf_cutoff: 0.3

  # ===== Window Parameters =====
  window_size: 10 #关键帧滑动窗口
  pose_window: 5 #5->4dtam 3,只更新滑动窗口中位姿优化窗口内的相机位姿

  # ===== Learning Rate =====
  lr:
    cam_rot_delta: 0.003
    cam_trans_delta: 0.001

  # ===== Other Training Parameters =====
  edge_threshold: 4 #4->4dtam 1.1
  rgb_boundary_threshold: 0.01
  prune_mode: 'slam'
  single_thread: False
  spherical_harmonics: False
  #近景幕布gs+雾片挡相机，限制gs尺寸
  alpha: 0.9
  low_freq_scale_multiplier: 2.0
  min_init_gaussian_scale: 0.002
  max_init_gaussian_scale: 0.06

  # ===== RSKM (Random Sampling Keyframe Mapping) =====
  use_rskm: false
  rskm_current_frame_interval: 4
  rskm_seed: 42
  rskm_debug_log: false
  normal_debug_log: false          # 是否输出法线对齐调试统计
  normal_debug_log_every: 50       # 法线对齐日志输出间隔（iterations）

# ============================================================
# FFT Edge VO Configuration (dense DT alignment, Edge VO style)
# ============================================================
FFTEdgeVO:
  use_fft_edge_vo: true
  tracking_refine_iters: 20
  tracking_fallback_iters: 100
  num_levels: 3
  level_scale: 0.5
  max_iters_coarse: 25
  max_iters_fine: 15
  dt_max_dist: 50.0
  dt_huber_delta: 5.0
  dt_mean_fail_threshold: 15.0
  require_visible_ratio: 0.3
  min_dt_mean: 0.5

  # Point budget & depth gate (Stage 8)
  max_cur_points: 8000             # 每帧最大采样点数
  min_cur_points: 300              # 每帧最小有效点数
  min_depth: 0.1                   # 最小有效深度 (m)
  max_depth: 8.0                   # 最大有效深度 (m)

  # Sampling (Stage 8)
  sampling_strategy: "grid"        # 采样策略: "grid" (均匀网格) 或 "random" (固定种子随机)
  vo_random_seed: 42               # random 采样的随机种子

  # Stage 4: VO reference pose sync with backend
  ref_pose_sync_trans_th: 0.01    # ref pose 平移同步阈值 (m)
  ref_pose_sync_rot_deg: 0.5      # ref pose 旋转同步阈值 (deg)
  max_ref_age: 4                   # VO reference 最大帧龄，超过触发强制刷新

  debug_log: true

  # Debug visualization (save images to disk for offline inspection)
  debug_save_images: false         # 是否保存调试图像到磁盘
  debug_save_dir: "debug_vo"       # 调试图像保存目录
  debug_save_interval: 10          # 每隔多少帧保存一次

  # Candidate Selection (Stage 2: multi-candidate render arbitration)
  candidate_selection_enable: false       # 是否启用多候选初值仲裁
  candidate_lambda_depth: 1.0             # 候选评分深度损失权重
  candidate_lambda_coverage: 1.0          # 候选评分覆盖率惩罚权重
  candidate_min_opacity_ratio: 0.05       # 候选最低不透明度覆盖率

  # VO Render Gate (Stage 3: render-based VO acceptance)
  vo_render_gate_enable: false            # 是否启用 VO render 二次验证
  vo_max_score_ratio_to_best: 1.25        # VO score / best score 上限
  vo_max_score_ratio_to_previous: 1.10    # VO score / previous score 上限
  vo_min_opacity_ratio: 0.05              # VO 候选最低不透明度覆盖率
  vo_max_depth_loss:                      # VO 候选最大深度损失 (null=不限制)
  vo_max_color_loss:

  # Submap Cut Quality Gate (Stage 7)
  submap_cut_gate_enable: false          # 是否启用子图切换质量门控
  submap_cut_min_opacity: 0.05           # 子图切换最低不透明度覆盖率
  submap_cut_max_delay: 3                # 最大延迟切图帧数

# ============================================================
# Backend Mapping Configuration (EAGS-style: Gaussian only)
# ============================================================
Backend:
  optimize_keyframe_pose: true
  optimize_keyframe_exposure: false
  backend_pose_sanity_check: true
  backend_restore_pose_if_changed: true
  pose_check_log_every: 99999

# ============================================================
# Submap Configuration
# ============================================================
Submap:
  # ===== Submap Cut Thresholds (motion-only, relative to submap start frame) =====
  trans_thre: 0.5
  rot_thre: 50

  seed_init_iters: 1500

  # ===== Gaussian Inheritance (替代 Handoff) =====
  use_inheritance: true             # 是否启用高斯继承
  inherit_keep_percent: 0.45        # 保留比例 (0.35-0.55)
  inherit_min_keep: 3000             # 最少保留数，保证最后子图覆盖充足
  inherit_tail_kfs: 4               # 参与评分的旧子图尾部关键帧数，2-6
  inherit_min_support: 2            # 最少共视关键帧数（含 seed 帧），1-4
  inherit_opacity_min: 0.20         # 最低 opacity 阈值（sigmoid 后），0.10-0.40
  inherit_max_points: 30000         # 继承高斯数量上限

# ============================================================
# RAP2DGS Lite Configuration (用于 Inheritance 高斯评分)
# ============================================================
RAP2DGSLite:
  enable: false                    # 总开关，false 时模块完全不加载
  use_in_inheritance: false         # inheritance 时使用 RAP2DGS Lite 替代原始支持度评分

  knn:
    k: 16                          # KNN 邻居数，消融验证 16 最优，8-32
    chunk_size: 4096               # chunked cdist 块大小，1024-8192

  features:
    use_support: true              # 共视支持度
    use_opacity: true              # 透明度
    use_observation: true          # 观测次数 n_obs
    use_area: true                 # surfel 面积
    use_normal: true               # 法向一致性
    use_density: true              # 局部密度

  score_weights:
    support: 0.25
    opacity: 0.20
    observation: 0.20
    area: 0.10
    normal: 0.15
    density: 0.10

  selection:
    keep_percent: 0.25             # 保留比例，0.15-0.40
    min_keep: 1000                 # 最少保留点数
    max_keep: 8000                 # 最多保留点数，≤ handoff_max_points

  safety:
    never_prune_active_map: true   # 硬约束：仅输出 mask，从不修改 GaussianModel
    log_report: true               # 每次 handoff 保存 JSON 报告

# ============================================================
# Loop Closure Configuration
# ============================================================
LoopClosure:

  # ===== Stage 0: LoopClosure mode control =====
  mode: verify_only  # choices: off, detect_only, verify_only, keyframe_pgo

  # ===== Stage 2: Keyframe retrieval =====
  keyframe_retrieval_top_k: 10
  keyframe_retrieval_min_score: 0.50
  keyframe_retrieval_min_temporal_gap: 10
  keyframe_retrieval_mutual_nearest: true
  keyframe_retrieval_mutual_top_n: 20
  allow_same_submap_loops: false           # 允许同子图回环检索（无子图策略时需开启）

  # ===== Stage 4: Depth verification =====
  depth_verify:
    enabled: true
    min_overlap: 0.20
    max_depth_rmse: 0.06
    min_inlier_ratio: 0.35
    depth_inlier_threshold: 0.10
    scale_search_min: 0.1
    scale_search_max: 20.0
    depth_sample_count: 5000
    scale_search_steps: 10

  # ===== Stage 5: Loop edge acceptance gates (odometry consistency + depth RMSE) =====
  loop_edge_gates:
    allow_depth_only: true          # 仅深度验证即可接受回环边
    max_delta_t_from_odom: 1.0      # ScanNet++ 深度位姿与里程计的最大平移偏差 (m)，0.5-5.0
    max_delta_r_deg_from_odom: 30.0 # 深度位姿与里程计的最大旋转偏差 (deg)，10-60
    max_depth_rmse: 0.05            # 接受回环边的最大深度 RMSE (m)，0.02-0.15

  # ===== Stage 7: Keyframe PGO safety =====
  keyframe_pgo_odom_info_scale: 10.0
  keyframe_pgo_handoff_info_scale: 5.0
  keyframe_pgo_debug_log: false           # PGO 详细摘要日志
  keyframe_pgo_safety:
    max_correction_t: 1.00
    max_correction_r_deg: 15.0
    max_odom_residual_increase_ratio: 2.00
    min_loop_residual_decrease_ratio: 0.30
    max_single_loop_residual_after_t: 0.30
    max_single_loop_residual_after_r_deg: 5.0
    min_verified_loop_edges: 3
    max_pgo_retries: 2
  pgo_voxel_size: 2.0
  pgo_edge_prune_threshold: 5.0

  # ===== Stage 9: Map correction from keyframe PGO =====
  MapCorrection:
    mode: submap_median_from_keyframes  # choices: none, submap_median_from_keyframes, owner_keyframe
    apply_online: false


  # ===== Basic Parameters =====
  min_interval: 3
  voxel_size: 0.05
  max_search_range: 5 #限制参与位姿图优化（PGO）的最近子图数量，控制搜索范围、计算量和内存占用



  # ===== Reloc3R (future replacement for GSReg+ICP) =====
  Reloc3R:
    enabled: false
    mock_mode: false
    repo_path: third_party/reloc3r
    checkpoint: siyan824/reloc3r-224
    local_checkpoint: weights/reloc3r-224.pth
    image_size: 224
    use_amp: true
    device: cuda
    topk_pairs: 5
    min_valid_pairs: 2
    pair_selection: cosplace_cross_similarity
    scale_mode: init_guess_norm
    depth_scale_check: false
    max_delta_t: 2.0
    max_delta_r_deg: 45.0
    max_pair_rot_std_deg: 15.0
    max_pair_trans_angle_std_deg: 25.0



# ============================================================
# Gaussian Optimization Parameters
# ============================================================
opt_params:
  # ===== Iteration Parameters =====
  iterations: 30000
  densify_from_iter: 500 #当总迭代次iter_count数达到该值时，把gs不透明度重置为0.01
  densify_until_iter: 15000
  densification_interval: 100
  opacity_reset_interval: 3000

  # ===== Learning Rates =====
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.001
  rotation_lr: 0.001

  # ===== Densification Parameters =====
  percent_dense: 0.01 #0.01->0.03
  densify_grad_threshold: 0.0002 #0.0002->0.0006

  # ===== Loss Parameters =====
  lambda_sensor_normal: 0.001 #
  lambda_dssim: 0.2
  lambda_dist: 0.0                 # 深度失真损失权重，0=关闭，0.01-0.1 用于压实表面消除浮空物。use_sa=true时语义为SA depth variance
  use_sa_dist: false               # use_sa=true时是否将SA depth variance加入loss。false=仅SA depth track，true=SA dist也进loss

# ============================================================
# Model Parameters
# ============================================================
model_params:
  sh_degree: 0
  source_path: ""

# ============================================================
# Pipeline Parameters
# ============================================================
pipeline_params:
  convert_SHs_python: False
  compute_cov3D_python: False
  depth_ratio: 1.0
  use_sa: false
  use_sa_depth: false
  depth_eps: 1.0e-6
  debug_sa_depth: false
  # psedo surface attributes
  # surf depth is either median or expected by setting depth_ratio to 1 or 0
  # for bounded scene, use median depth, i.e., depth_ratio = 1;
  # for unbounded scene, use expected depth, i.e., depth_ration = 0, to reduce disk anliasing.

# ============================================================
# Ablation Switches
# ============================================================
Ablation:
  use_submap: True           # (2) 是否开启子图切图策略 (关闭时退化为全局单地图)
  use_loop_closure: True     # (3)&(4) 是否开启回环检测与全局 PGO 修正
  use_fdn: True              # (5) 是否开启有限差分法线监督及相关 Loss 衰减
  use_fft_mask: True         # (6) 是否开启 FFT 高低频掩膜指导采样与初始尺度设定
  use_error_mask: True       # (6) 是否开启渲染误差掩膜指导动态补点
  use_color_refinement: True   # (8) 是否开启颜色优化（如果开启，则在每次优化迭代中同时优化颜色相关参数；如果关闭，则只优化几何相关参数，颜色参数保持不变）
