# ============================================================
# Results Configuration
# ============================================================
Results:
  save_results: True
  save_dir: "replica_results"
  save_trj: True
  save_trj_kf_intv: 20 #20->40
  use_gui: False
  eval_rendering: False
  use_wandb: False

# ============================================================
# Dataset Configuration
# ============================================================
Dataset:
  type: 'replica'
  sensor_type: 'depth'
  pcd_downsample: 64 #其他阶段下采样因子，保留1/64%点云
  pcd_downsample_init: 32 #初始阶段下采样因子
  adaptive_pointsize: True #点大小乘中值深度得到场景中点的实际大小，限制最小为0.05
  point_size: 0.05 # 影响scales的初始化
  Calibration:
    fx: 600.0
    fy: 600.0
    cx: 599.5
    cy: 339.5
    k1: 0.0
    k2: 0.0
    p1: 0.0
    p2: 0.0
    k3: 0.0
    width: 1200
    height: 680
    depth_scale: 6553.5
    distorted: False

# ============================================================
# Training Configuration
# ============================================================
Training:
  # ===== Initialization Parameters =====
  init_itr_num: 1050 # 首帧初始化时优化的迭代次数
  init_gaussian_update: 100 #每隔多少次进行一次gs密化和修剪
  init_gaussian_reset: 500 #当总迭代次数iter_count达到该值时，把gs不透明度重置为0.01
  init_gaussian_th: 0.005 #该值设置必须小于0.01，由于reset opacity为0.01<0.02，则全员gs被剪枝，0.005->0.02
  init_gaussian_extent: 30 #对densify的影响:值越大倾向于clone,值越小倾向于split,对prune的影响:值越大浮空伪影无法被剔除，值越小容易过度剔除，背景空洞

  # ===== Tracking Parameters =====
  tracking_itr_num: 100 #每帧跟踪优化的迭代次数

  # ===== Mapping Parameters =====
  mapping_itr_num: 150 #建图阶段每处理一个新关键帧时的优化迭代次数150->4dtam 5
  gaussian_update_every: 150 #每隔多少次进行一次gs密化和修剪,
  gaussian_update_offset: 50 #当总迭代次数为50、50+150、50+2*150、50+3*150...时进行gs密化和修剪
  gaussian_th: 0.7 #控制高斯点的不透明度下限，小于该值的gs会被剔除
  gaussian_extent: 1.0 ##gs的scaling>该值*camera_extent*0.1时被剔除
  gaussian_reset: 2001 #当总迭代次数iter_count达到该值时，把gs不透明度重置为0.01
  size_threshold: 20 #如果max_radii2d(好像全0)>投影gs尺寸阈值，则被剔除

  # ===== Keyframe Parameters =====
  kf_interval: 4 #创建关键帧的间隔帧数
  kf_translation: 0.04
  kf_min_translation: 0.02
  kf_overlap: 0.95

  # ===== Window Parameters =====
  window_size: 10 #关键帧滑动窗口
  pose_window: 5 #只更新滑动窗口中位姿优化窗口内的相机位姿

  # ===== Learning Rate =====
  lr:
    cam_rot_delta: 0.003
    cam_trans_delta: 0.001

  # ===== Other Training Parameters =====
  edge_threshold: 4
  rgb_boundary_threshold: 0.01
  prune_mode: 'slam'
  single_thread: False
  spherical_harmonics: False
  #近景幕布gs+雾片挡相机，限制gs尺寸
  low_freq_scale_multiplier: 1.05
  min_init_gaussian_scale: 0.002
  max_init_gaussian_scale: 0.06

# ============================================================
# Submap Configuration
# ============================================================
Submap:
  # ===== Basic Thresholds =====
  trans_thre: 1.5
  rot_thre: 60

  # ===== Protection Parameters =====
  min_frames: 20            # 一个子图至少先跑这么多帧
  min_kfs: 6                # 一个子图至少先积累这么多关键帧
  recent_kfs: 3             # 用最近 3 个关键帧检查与旧子图的重叠
  cut_overlap: 0.40         # 最近关键帧最大重叠低于它，才算"真的要离开旧子图"
  cut_overlap_hard: 0.25    # 极低重叠，用于非关键帧情况下的强 novel 保护
  cut_confirm_frames: 2     # 连续满足 2 次再切，防止单帧噪声误切
  cancel_overlap: 0.65      # 如果重叠又回来了，就取消 pending cut

  # ===== Mode Parameters =====
  hard_trans_mult: 1.35     # 平移远超阈值时允许更快切图
  hard_rot_mult: 1.20       # 旋转远超阈值时进入"强旋转模式"
  rot_only_overlap_guard: 0.55  # 纯旋转切图时必须仍然要求 overlap 不高
  use_global_seed_submap: true

# ============================================================
# Loop Closure Configuration
# ============================================================
LoopClosure:
  # ===== Basic Parameters =====
  keep_recent_submaps: 3         # 显存中只保留最近 3 个子图
  min_interval: 3
  voxel_size: 0.05
  feature_keep_ratio: 0.30

  # ===== Loop Detection Thresholds =====
  max_loop_delta_translation: 0.80
  max_loop_delta_rotation_deg: 45.0
  icp_fitness_threshold: 0.60

  # ===== Adjacent Submap Constraints =====
  adjacent_icp_fitness_threshold: 0.45
  adjacent_icp_rmse_threshold: 0.03
  max_adjacent_delta_translation: 0.25
  max_adjacent_delta_rotation_deg: 12.0
  adjacent_edge_weight: 0.25
  adjacent_info_min_scale: 0.5
  adjacent_info_max_scale: 8.0

  # ===== PGO Parameters =====
  default_odom_info_scale: 120.0
  enable_chain_pgo_without_loop: true
  chain_pgo_window: 4
  recent_query_submaps: 2
  pgo_edge_prune_thres: 0.25

# ============================================================
# Gaussian Optimization Parameters
# ============================================================
opt_params:
  # ===== Iteration Parameters =====
  iterations: 30000
  densify_from_iter: 500 #当总迭代次iter_count数达到该值时，把gs不透明度重置为0.01
  densify_until_iter: 15000
  densification_interval: 100
  opacity_reset_interval: 3000

  # ===== Learning Rates =====
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.001
  rotation_lr: 0.001

  # ===== Densification Parameters =====
  percent_dense: 0.01
  densify_grad_threshold: 0.0002 #0.0002->0.0006

  # ===== Loss Parameters =====
  lambda_sensor_normal: 0.001
  lambda_dssim: 0.2

# ============================================================
# Model Parameters
# ============================================================
model_params:
  sh_degree: 0
  source_path: ""
  model_path: ""
  resolution: -1
  white_background: False
  data_device: "cuda"

# ============================================================
# Pipeline Parameters
# ============================================================
pipeline_params:
  convert_SHs_python: False
  compute_cov3D_python: False
  depth_ratio: 1.0
  # psedo surface attributes
  # surf depth is either median or expected by setting depth_ratio to 1 or 0
  # for bounded scene, use median depth, i.e., depth_ratio = 1;
  # for unbounded scene, use expected depth, i.e., depth_ration = 0, to reduce disk anliasing.

# ============================================================
# Ablation Switches
# ============================================================
Ablation:
  use_submap: True          # (2) 是否开启子图切图策略 (关闭时退化为全局单地图)
  use_loop_closure: True     # (3)&(4) 是否开启回环检测与全局 PGO 修正
  use_fdn: True              # (5) 是否开启有限差分法线监督及相关 Loss 衰减
  use_fft_mask: True         # (6) 是否开启 FFT 高低频掩膜指导采样与初始尺度设定
  use_error_mask: True       # (6) 是否开启渲染误差掩膜指导动态补点
  use_color_refinement: True   # (8) 是否开启颜色优化（如果开启，则在每次优化迭代中同时优化颜色相关参数；如果关闭，则只优化几何相关参数，颜色参数保持不变）
