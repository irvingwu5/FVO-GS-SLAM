# ============================================================
# Experiment Configuration (Global Seed & Reproducibility)
# ============================================================
Experiment:
  seed: 42                          # 全局随机种子，控制 Python/NumPy/PyTorch/cuDNN
  deterministic: false               # 是否启用 cuDNN deterministic（true=可复现优先，false=速度优先）

# ============================================================
# Results Configuration
# ============================================================
Results:
  save_results: True               # 是否保存结果到硬盘
  save_dir: "replica_results"      # 结果根目录
  save_trj: True                   # 是否保存轨迹文件 (.txt)
  save_trj_kf_intv: 20             # 轨迹保存间隔（每 N 帧），Replica 帧数较多设 20
  use_gui: False                   # 是否启用 OpenGL GUI 可视化
  eval_rendering: False            # 是否评估渲染质量（PSNR/SSIM/LPIPS/Depth L1）
  use_wandb: False                 # 是否启用 W&B 在线日志

# ============================================================
# Dataset Configuration
# ============================================================
Dataset:
  type: 'replica'                  # 数据集类型: tum / replica / scannetpp
  sensor_type: 'depth'             # 传感器模式: depth（RGBD）/ monocular
  pcd_downsample: 64               # 建图阶段点云下采样因子 (1/N)，Replica 1200×680 → 64
  pcd_downsample_init: 32          # 首帧/seed 帧初始化时下采样因子，值越小点越多
  adaptive_pointsize: True         # 是否根据中值深度自适应调整 point_size
  point_size: 0.05                 # 基础点大小 (m)，Replica 场景尺度大设 0.05
  Calibration:
    fx: 600.0                      # [Replica 默认内参] 仅当场景 yaml 未覆盖时使用
    fy: 600.0
    cx: 599.5
    cy: 339.5
    k1: 0.0
    k2: 0.0
    p1: 0.0
    p2: 0.0
    k3: 0.0
    width: 1200
    height: 680
    depth_scale: 6553.5
    distorted: False

# ============================================================
# Training Configuration
# ============================================================
Training:
  # ===== Initialization Parameters =====
  init_itr_num: 1050               # 首帧/seed 帧初始化迭代次数，500-2000
  init_gaussian_update: 100        # 初始化阶段每 N 次迭代执行一次 densify+prune
  init_gaussian_reset: 500         # 初始化阶段第 N 次迭代重置 opacity 为 0.01
  init_gaussian_th: 0.005          # 初始化阶段 prune 的 opacity 下限，必须 < 0.01
  init_gaussian_extent: 30         # 初始化阶段 densify extent 系数，越大越倾向 clone

  # ===== Tracking Parameters =====
  tracking_itr_num: 100            # 每帧 tracking 渲染精化迭代次数

  # ===== Mapping Parameters =====
  mapping_itr_num: 150             # 每关键帧 mapping 迭代次数，Replica 收敛快设 150（TUM: 180）
  gaussian_update_every: 150       # densify+prune 间隔（迭代次数）
  gaussian_update_offset: 50       # 首次 densify+prune 偏移（iteration==offset 时触发）
  gaussian_th: 0.7                 # prune 的 opacity 下限，低于此值被剔除，0.3-0.9
  gaussian_extent: 1.0             # prune 的 scaling 上限系数，scaling > extent*0.1 被剔除
  gaussian_reset: 2001             # 周期性 opacity reset 的迭代间隔，1000-5000
  size_threshold: 20               # 2D 投影半径上限 (pixels)，超限触发 prune

  # ===== Keyframe Parameters =====
  kf_interval: 4                   # 最小关键帧间隔（帧数），Replica 帧率低设 4
  kf_translation: 0.04             # 关键帧插入平移阈值 (m)，Replica 场景小设 0.04（TUM: 0.08）
  kf_min_translation: 0.02         # 最小平移阈值 (m)，Replica: 0.02（TUM: 0.05）
  kf_overlap: 0.95                 # 关键帧重叠率阈值，Replica 运动慢设 0.95（TUM: 0.90）
  kf_cutoff: 0.3                   # 关键帧选择截止比例，0.2-0.5

  # ===== Window Parameters =====
  window_size: 10                  # 滑动窗口中关键帧数量，Replica 设 10（TUM: 8）
  pose_window: 5                   # 滑动窗口中参与位姿优化的关键帧数，Replica: 5（TUM: 3）

  # ===== Learning Rate =====
  lr:
    cam_rot_delta: 0.003           # 位姿旋转 delta 学习率，0.001-0.01
    cam_trans_delta: 0.001         # 位姿平移 delta 学习率，0.0005-0.00

  # ===== Other Training Parameters =====
  edge_threshold: 4                # 深度边缘阈值，Replica 深度噪声低设 4（TUM: 1.1）
  rgb_boundary_threshold: 0.01     # RGB 边界检测阈值
  alpha: 0.9                       # 渲染透明度混合系数（RGB weight），0.80-0.95
  prune_mode: 'slam'               # prune 模式: 'slam'（基于 covisibility）/ 'odometry'
  single_thread: False             # True=前端后端在同一进程运行
  spherical_harmonics: False       # True=启用高阶 SH（需 sh_degree>0）
  low_freq_scale_multiplier: 2.0    # 低频区域初始 Gaussian scale 乘数，1.0-3.0（FGS-SLAM: 2.0）
  min_init_gaussian_scale: 0.002   # 初始 Gaussian scale 下限 (m)，0.001-0.005
  max_init_gaussian_scale: 0.06    # 初始 Gaussian scale 上限 (m)，0.02-0.10

  # FGS-style mask seeding
  use_freq_sampling_density: true   # 是否启用频率感知采样密度（高频密/低频疏）高斯初始 采样密度（高频密、低频疏）依赖 fft_mask总开关
  high_freq_sample_stride: 2        # 高频区域采样步长（1=全采样）
  low_freq_sample_stride: 4         # 低频区域采样步长
  depth_error_median_factor: 10.0   # 深度穿透误差阈值乘数（FGS-SLAM: 10）
  error_mask_opacity_th: 0.98       # alpha 空洞检测阈值（FGS-SLAM: 0.98）
  use_rgb_error_mask: false         # 是否启用 RGB 表达误差掩膜error_mask 中是否包含 RGB 颜色错误 分量依赖 error_mask总开关
  rgb_error_th: 0.5                 # RGB 误差阈值（0-1 空间）
  max_new_gaussians_per_keyframe: 30000  # 每关键帧新增高斯数量上限


  # Depth edge filter (keep only geometric edges for FFT mask)
  use_depth_edge_filter: false       # 开启深度边缘筛选
  depth_grad_percentile: 80         # 深度梯度百分位阈值

  # ===== RSKM (Random Sampling Keyframe Mapping) =====
  use_rskm: true                  # 是否启用子图内随机关键帧重放
  rskm_current_frame_interval: 4   # 每 N 次采样强制使用当前帧（避免遗忘），2-8
  rskm_seed: 42                    # RSKM 随机种子（省略则使用 Experiment.seed）
  rskm_debug_log: false            # 是否输出 RSKM 调试统计
  normal_debug_log: false          # 是否输出法线对齐调试统计
  normal_debug_log_every: 50       # 法线对齐日志输出间隔（iterations）
  debug_seed_vis: false             # 是否保存 FFT mask 播种可视化

# ============================================================
# VOPrior Configuration (tracking initial pose source)
# ============================================================
VOPrior:
  type: simple_rgbd_odom           # VO prior type: "none" | "simple_rgbd_odom"
  debug_log: false                  # 是否输出 VOPrior 调试日志
  full_render_warmup_frames: 100     # 前 N 帧跳过 VO，全量 100 迭代 warmup（0=关闭）
  tracking_refine_iters: 60         # VO render-accepted 后精化迭代数
  tracking_fallback_iters: 120      # VO 失败/未选中时渲染精化迭代数

  # Candidate Selection (Stage 2: multi-candidate render arbitration)
  candidate_selection_enable: true        # 是否启用多候选初值仲裁
  candidate_lambda_depth: 1.0             # 候选评分深度损失权重
  candidate_lambda_coverage: 1.0          # 候选评分覆盖率惩罚权重
  candidate_min_opacity_ratio: 0.05       # 候选最低不透明度覆盖率

  # VO Render Gate (Stage 3: render-based VO acceptance)
  vo_render_gate_enable: true             # 是否启用 VO render 二次验证
  vo_max_score_ratio_to_best: 1.25        # VO score / best score 上限
  vo_max_score_ratio_to_previous: 1.10    # VO score / previous score 上限
  vo_min_opacity_ratio: 0.05              # VO 候选最低不透明度覆盖率
  vo_max_depth_loss:                      # VO 候选最大深度损失 (null=不限制)
  vo_max_color_loss:                      # VO 候选最大颜色损失 (null=不限制)

  # Submap Cut Quality Gate (Stage 7)
  submap_cut_gate_enable: false          # 是否启用子图切换质量门控
  submap_cut_min_opacity: 0.05           # 子图切换最低不透明度覆盖率
  submap_cut_max_delay: 3                # 最大延迟切图帧数

# ============================================================
# Simple-RGBD-Odometry Configuration (external VO prior)
# ============================================================
SimpleRGBDOdom:
  enable: true
  image_order: rgb
  max_correspondence_distance: 0.20
  voxel_size: 0.50
  max_distance: 5.0
  max_points_per_voxel: 20
  depth_factor: 1.0
  min_range: 0.05
  max_range: 5.0
  orb_nfeatures: 1000
  orb_scale_factor: 1.2
  orb_nlevels: 8
  search_radius: 5.0
  min_valid_keypoints: 80
  min_inliers: 20
  min_inlier_ratio: 0.15
  max_motion_trans: 0.50
  max_motion_rot_deg: 30.0
  reset_on_submap_cut: false
  reset_on_tracking_lost: true
  debug_log: false

# ============================================================
# Backend Mapping Configuration (EAGS-style: Gaussian only)
# ============================================================
Backend:
  optimize_keyframe_pose: true     # 后端是否优化关键帧位姿
  optimize_keyframe_exposure: false # 后端是否优化关键帧曝光参数
  backend_pose_sanity_check: false # [Replica] 关闭 sanity check（Replica 深度噪声低，pose 更稳定）
  backend_restore_pose_if_changed: true  # sanity check 失败时恢复原始位姿
  backend_pose_check_eps_t: 1.0e-08     # 位姿检查平移容差 (m)
  backend_pose_check_eps_r_deg: 1.0e-06 # 位姿检查旋转容差 (deg)
  pose_check_log_every: 99999      # 每 N 次 mapping 输出一次 pose check 汇总

# ============================================================
# Submap Configuration
# ============================================================
Submap:
  # ===== Submap Cut Thresholds (motion-only, relative to submap anchor) =====
  trans_thre: 1.5                  # 切图平移阈值 (m)，Replica 房间小设 1.5（TUM: 2.0）
  rot_thre: 60                     # 切图旋转阈值 (deg)，Replica 设 60（TUM: 80）

  seed_init_iters: 1500            # 新子图 seed 帧初始化迭代数，500-2000

  # ===== Gaussian Inheritance (替代 Handoff) =====
  # 子图切图时保留 top-K% 旧高斯作为新子图 active 初始，其余删除。
  # 继承的高斯可被新子图优化，消除冷启动覆盖缺口。
  use_inheritance: false           # 是否启用高斯继承（Replica 参考配置关闭）
  inherit_keep_percent: 0.45        # 保留比例 (0.35-0.55)
  inherit_min_keep: 3000             # 最少保留数，保证最后子图覆盖充足
  inherit_tail_kfs: 4               # 参与评分的旧子图尾部关键帧数，2-6
  inherit_min_support: 2            # 最少共视关键帧数（含 seed 帧），1-4
  inherit_opacity_min: 0.20         # 最低 opacity 阈值（sigmoid 后），0.10-0.40
  inherit_max_points: 30000         # 继承高斯数量上限

# ============================================================
# RAP2DGS Lite Configuration (用于 Inheritance 高斯评分)
# ============================================================
RAP2DGSLite:
  enable: false                     # 总开关，false 时模块完全不加载
  use_in_inheritance: false         # inheritance 时使用 RAP2DGS Lite 替代原始支持度评分

  knn:
    k: 16                          # KNN 邻居数，消融验证 16 最优，8-32
    chunk_size: 4096               # chunked cdist 块大小，1024-8192

  features:
    use_support: true              # 共视支持度（percentile 归一化）
    use_opacity: true              # 透明度（min-max 归一化）
    use_observation: true          # 观测次数 n_obs（log1p+percentile 归一化）
    use_area: true                 # surfel 面积（有界中区评分）
    use_normal: true               # 法向一致性（KNN 邻域内 |dot| 均值）
    use_density: true              # 局部密度（KNN 平均距离的有界中区评分）

  score_weights:
    support: 0.25                  # 共视是最核心跨子图信号
    opacity: 0.20
    observation: 0.20
    area: 0.10
    normal: 0.15
    density: 0.10

  selection:
    keep_percent: 0.25             # 保留比例，消融验证 0.25 最优，0.15-0.40
    min_keep: 1000                 # 最少保留点数
    max_keep: 8000                 # 最多保留点数，≤ handoff_max_points

  safety:
    never_prune_active_map: true   # 硬约束：仅输出 mask，从不修改 GaussianModel
    log_report: false               # 每次 handoff 保存 JSON 报告

# ============================================================
# Loop Closure Configuration
# ============================================================
LoopClosure:

  # ===== Stage 0: LoopClosure mode control =====
  mode: keyframe_pgo               # off / detect_only / verify_only / keyframe_pgo

  # ===== FFTVO ablation guard =====
  debug_disable_pgo_for_fftvo_test: true  # [Replica] 关闭 PGO 修正，仅保留回环检测+子图管理

  # ===== Stage 2: Keyframe retrieval =====
  keyframe_retrieval_top_k: 10     # CosPlace 检索返回 top-K 候选，5-20
  keyframe_retrieval_min_score: 0.50  # CosPlace 相似度最低阈值，0.30-0.70
  keyframe_retrieval_min_temporal_gap: 10  # 最小帧间隔（防止相邻帧自匹配）
  keyframe_retrieval_mutual_nearest: true  # 是否要求互为最近邻
  keyframe_retrieval_mutual_top_n: 20      # 互为最近邻检索的候选池大小
  allow_same_submap_loops: false           # 允许同子图回环检索（无子图策略时需开启）

  # ===== Stage 4: Depth verification =====
  depth_verify:
    enabled: false
    min_overlap: 0.20              # 最小深度重叠率，0.10-0.30
    max_depth_rmse: 0.08           # [Replica] 最大深度 RMSE (m)，Replica 深度干净设 0.08（TUM: 0.80）
    min_inlier_ratio: 0.15         # [Replica] 最小内点比率，0.10-0.30（TUM: 0.05，Replica 深度可靠设更高）
    depth_inlier_threshold: 0.10   # [Replica] 深度内点阈值 (m)，0.05-0.15（Replica 深度噪声低设 0.10）
    depth_sample_count: 5000       # 深度采样点数，2000-10000
    scale_search_steps: 20         # 对数空间尺度搜索步数，10-30
    scale_search_min: 0.1          # 最小尺度因子
    scale_search_max: 20.0         # 最大尺度因子

  # ===== Stage 5: Loop edge acceptance gates (odometry consistency + depth RMSE) =====
  loop_edge_gates:
    allow_depth_only: true          # [Replica] 仅深度验证即可接受回环边
    max_delta_t_from_odom: 3.0      # [Replica] 深度位姿与里程计的最大平移偏差 (m)，0.5-5.0
    max_delta_r_deg_from_odom: 30.0 # [Replica] 深度位姿与里程计的最大旋转偏差 (deg)，10-60
    max_depth_rmse: 0.08            # [Replica] 接受回环边的最大深度 RMSE (m)，0.03-0.15

  # ===== Stage 7: Keyframe PGO safety =====
  keyframe_pgo_odom_info_scale: 120.0    # [Replica] PGO 里程计边信息矩阵缩放（参考 0.1cm: 120.0）
  keyframe_pgo_handoff_info_scale: 5.0   # PGO handoff 边信息矩阵缩放
  keyframe_pgo_debug_log: false           # PGO 详细摘要日志（开启后每轮输出完整残差/修正统计）
  keyframe_pgo_safety:
    max_correction_t: 1.00               # PGO 最大平移修正 (m)，0.5-2.0
    max_correction_r_deg: 15.0           # PGO 最大旋转修正 (deg)，5-30
    max_odom_residual_increase_ratio: 2.00  # 里程计边残差膨胀比上限
    min_loop_residual_decrease_ratio: 0.30  # 回环边残差下降比下限
    max_single_loop_residual_after_t: 0.30  # 优化后单条回环边最大平移残差 (m)
    max_single_loop_residual_after_r_deg: 5.0  # 优化后单条回环边最大旋转残差 (deg)
    min_verified_loop_edges: 3           # 最少验证通过的回环边数
    max_pgo_retries: 2                   # PGO 最大重试次数（鲁棒边剔除）
  pgo_voxel_size: 2.0                    # PGO 关键帧下采样体素 (m)
  pgo_edge_prune_threshold: 0.25         # [Replica] 鲁棒边剔除残差阈值（参考 0.1cm: 0.25）

  # ===== Stage 9: Map correction from keyframe PGO =====
  MapCorrection:
    mode: submap_median_from_keyframes   # none / submap_median_from_keyframes / owner_keyframe
    apply_online: false                  # 仅 final merge 时应用，不写 ckpt

  # ===== Basic Parameters =====
  min_interval: 3                  # 两次回环检测最小间隔（关键帧数）
  voxel_size: 0.05                 # [Replica] 深度验证点云下采样体素 (m)，0.02-0.08（Replica 场景大设 0.05）

  # ===== GSReg Registration =====
  registration_method: 2dgs_gsreg  # [Replica] 2DGS-GSReg 配准方法
  gsreg_overlap_radius: 0.1
  gsreg_min_overlap: 0.05
  gsreg_topk_views: 3
  gsreg_max_iters: 80
  gsreg_lr_rot: 0.002
  gsreg_lr_trans: 0.005
  gsreg_rgb_weight: 1.0
  gsreg_depth_weight: 1.0
  gsreg_normal_weight: 0.1
  gsreg_opacity_weight: 0.0
  gsreg_max_loss: 0.10              # [Replica] 最大配准 loss（参考 0.1cm: 0.10）
  gsreg_use_render_target: false
  gsreg_min_successful_views: 1
  gsreg_max_delta_t_from_init: 0.5
  gsreg_max_delta_r_from_init: 30.0
  allow_identity_loop_init: false

  # ===== Loop Acceptance Gates =====
  max_loop_delta_translation: 0.8       # [Replica] 回环边最大平移 (m)
  max_loop_delta_rotation_deg: 45.0     # 回环边最大旋转 (deg)
  icp_fitness_threshold: 0.60           # [Replica] ICP fitness 阈值（参考 0.1cm: 0.60）

  # ===== PGO Input Gates =====
  min_loop_fitness_for_pgo: 0.6
  max_loop_rmse_for_pgo: 0.022          # [Replica] 允许进入 PGO 的最大深度 RMSE
  max_loop_delta_t_for_pgo: 0.08        # [Replica] 允许进入 PGO 的最大平移 (m)
  max_loop_delta_r_for_pgo: 5.0         # [Replica] 允许进入 PGO 的最大旋转 (deg)
  recent_query_submaps: 2               # [Replica] 最近 N 个子图参与检索

  # ===== Reloc3R =====
  Reloc3R:
    enabled: false
    mock_mode: false               # True=跳过推理（调试用）
    repo_path: third_party/reloc3r
    checkpoint: siyan824/reloc3r-224
    local_checkpoint: weights/reloc3r-224.pth
    image_size: 224                # 输入图像尺寸
    use_amp: true                  # 自动混合精度
    device: cuda
    topk_pairs: 5                  # 返回 top-K 关键帧对，3-10
    min_valid_pairs: 2             # 最少有效对数，1-5
    pair_selection: cosplace_cross_similarity
    scale_mode: init_guess_norm
    max_delta_t: 2.0               # Reloc3R 粗位姿允许的最大平移 (m)
    max_delta_r_deg: 45.0          # Reloc3R 粗位姿允许的最大旋转 (deg)
    max_pair_rot_std_deg: 15.0     # 多对估计旋转标准差上限 (deg)
    max_pair_trans_angle_std_deg: 25.0  # 多对估计平移角度标准差上限 (deg)

# ============================================================
# Gaussian Optimization Parameters
# ============================================================
opt_params:
  # ===== Iteration Parameters =====
  iterations: 30000                # 最大总迭代次数（离线优化使用）
  densify_from_iter: 500           # 从第 N 次迭代开始 densify
  densify_until_iter: 15000        # 到第 N 次迭代停止 densify
  densification_interval: 100      # densify 间隔
  opacity_reset_interval: 3000     # opacity reset 间隔

  # ===== Learning Rates =====
  position_lr_init: 0.00016        # 位置初始学习率
  position_lr_final: 0.0000016     # 位置最终学习率
  position_lr_delay_mult: 0.01     # 位置学习率延迟乘数
  position_lr_max_steps: 30000     # 位置学习率衰减总步数
  feature_lr: 0.0025               # 球谐系数学习率
  opacity_lr: 0.05                 # 不透明度学习率，0.01-0.10
  scaling_lr: 0.001                # 缩放学习率
  rotation_lr: 0.001               # 旋转学习率

  # ===== Densification Parameters =====
  percent_dense: 0.01              # 稠密化比例（×scene_extent），0.005-0.02
  densify_grad_threshold: 0.0002   # 位置梯度阈值，超此值触发 densify，0.0001-0.001

  # ===== Loss Parameters =====
  lambda_sensor_normal: 0.0      # [Replica] FDN 法向损失权重（参考 0.1cm: 0.001）
  lambda_dssim: 0.2                # SSIM 损失权重，0.1-0.3
  lambda_dist: 0.005                 # 深度失真损失权重，use_sa=true时语义为SA depth variance
  use_sa_dist: true                # use_sa=true时是否将SA depth variance加入loss

# ============================================================
# Model Parameters
# ============================================================
model_params:
  sh_degree: 0                     # 球谐函数阶数，0=仅 DC（RGB），1-3=高阶 SH
  source_path: ""                  # 离线加载 PLY 路径（slam.py 初始化 GaussianModel 时需要）

# ============================================================
# Pipeline Parameters
# ============================================================
pipeline_params:
  convert_SHs_python: False
  compute_cov3D_python: False
  depth_ratio: 1.0                 # Replica: 1.0=median depth，合成深度无噪声用 median 最优
  use_sa: false                    # Replica 关闭 SA（SA 平滑损害遮挡边界 tracking 精度）
  use_sa_depth: true               # SA surfel-aware depth，Python 渲染层深度选择策略
  depth_eps: 1.0e-6                # 计算期望深度时的安全除数
  debug_sa_depth: false


# ============================================================
# Ablation Switches
# ============================================================
Ablation:
  use_submap: False                  # [Replica] 子图切图策略（参考 0.1cm 开启，控制漂移）
  use_loop_closure: False            # [Replica] 回环检测+子图管理（参考 0.1cm 开启，PGO 由 debug_disable 关闭）
  use_fdn: False                     # [Replica] FDN 有限差分法向监督（参考 0.1cm 开启）
  use_fft_mask: True                # FFT 高低频掩膜指导采样与初始 scale
  use_error_mask: True               # 渲染误差掩膜指导动态补点
  use_color_refinement: True       # [Replica] 关闭离线颜色精化（参考 0.1cm 关闭）

