# ============================================================
# Results Configuration
# ============================================================
Results:
  save_results: True
  save_dir: "replica_results"
  save_trj: True
  save_trj_kf_intv: 20 #20->40
  use_gui: False
  eval_rendering: False
  use_wandb: False

# ============================================================
# Dataset Configuration
# ============================================================
Dataset:
  type: 'replica'
  sensor_type: 'depth'
  pcd_downsample: 64 #其他阶段下采样因子，保留1/64%点云
  pcd_downsample_init: 32 #初始阶段下采样因子
  adaptive_pointsize: True #点大小乘中值深度得到场景中点的实际大小，限制最小为0.05
  point_size: 0.05 # 影响scales的初始化
  Calibration:
    fx: 600.0
    fy: 600.0
    cx: 599.5
    cy: 339.5
    k1: 0.0
    k2: 0.0
    p1: 0.0
    p2: 0.0
    k3: 0.0
    width: 1200
    height: 680
    depth_scale: 6553.5
    distorted: False

# ============================================================
# Training Configuration
# ============================================================
Training:
  # ===== Initialization Parameters =====
  init_itr_num: 1050 # 首帧初始化时优化的迭代次数
  init_gaussian_update: 100 #每隔多少次进行一次gs密化和修剪
  init_gaussian_reset: 500 #当总迭代次数iter_count达到该值时，把gs不透明度重置为0.01
  init_gaussian_th: 0.005 #该值设置必须小于0.01，由于reset opacity为0.01<0.02，则全员gs被剪枝，0.005->0.02
  init_gaussian_extent: 30 #对densify的影响:值越大倾向于clone,值越小倾向于split,对prune的影响:值越大浮空伪影无法被剔除，值越小容易过度剔除，背景空洞

  # ===== Tracking Parameters =====
  tracking_itr_num: 100 #每帧跟踪优化的迭代次数

  # ===== Mapping Parameters =====
  mapping_itr_num: 150 #建图阶段每处理一个新关键帧时的优化迭代次数150->4dtam 5
  gaussian_update_every: 150 #每隔多少次进行一次gs密化和修剪,
  gaussian_update_offset: 50 #当总迭代次数为50、50+150、50+2*150、50+3*150...时进行gs密化和修剪
  gaussian_th: 0.7 #控制高斯点的不透明度下限，小于该值的gs会被剔除
  gaussian_extent: 1.0 ##gs的scaling>该值*camera_extent*0.1时被剔除
  gaussian_reset: 2001 #当总迭代次数iter_count达到该值时，把gs不透明度重置为0.01
  size_threshold: 20 #如果max_radii2d(好像全0)>投影gs尺寸阈值，则被剔除

  # ===== Keyframe Parameters =====
  kf_interval: 4 #创建关键帧的间隔帧数
  kf_translation: 0.04
  kf_min_translation: 0.02
  kf_overlap: 0.95
  kf_cutoff: 0.3

  # ===== Window Parameters =====
  window_size: 10 #关键帧滑动窗口
  pose_window: 5 #只更新滑动窗口中位姿优化窗口内的相机位姿

  # ===== Learning Rate =====
  lr:
    cam_rot_delta: 0.003
    cam_trans_delta: 0.001

  # ===== Other Training Parameters =====
  edge_threshold: 4
  rgb_boundary_threshold: 0.01
  prune_mode: 'slam'
  single_thread: False
  spherical_harmonics: False
  #近景幕布gs+雾片挡相机，限制gs尺寸
  alpha: 0.9
  low_freq_scale_multiplier: 2.0
  min_init_gaussian_scale: 0.002
  max_init_gaussian_scale: 0.06

  # ===== RSKM (Random Sampling Keyframe Mapping) =====
  use_rskm: false
  rskm_current_frame_interval: 4
  rskm_seed: 42
  rskm_debug_log: false

# ============================================================
# FFT Edge VO Configuration (dense DT alignment, Edge VO style)
# ============================================================
FFTEdgeVO:
  use_fft_edge_vo: true
  tracking_refine_iters: 120
  tracking_fallback_iters: 100
  num_levels: 3
  level_scale: 0.5
  max_iters_coarse: 25
  max_iters_fine: 15
  dt_max_dist: 50.0
  dt_huber_delta: 5.0
  dt_mean_fail_threshold: 15.0
  require_visible_ratio: 0.3
  min_dt_mean: 0.5
  debug_log: false

# ============================================================
# Backend Mapping Configuration (EAGS-style: Gaussian only)
# ============================================================
Backend:
  optimize_keyframe_pose: true
  optimize_keyframe_exposure: false
  backend_pose_sanity_check: false
  backend_restore_pose_if_changed: true
  backend_pose_check_eps_t: 1.0e-8
  backend_pose_check_eps_r_deg: 1.0e-6
  pose_check_log_every: 99999

# ============================================================
# Submap Configuration
# ============================================================
Submap:
  # ===== Submap Cut Thresholds (motion-only, relative to submap start frame) =====
  trans_thre: 1.5
  rot_thre: 60

  seed_init_iters: 1500

  # ===== Cross-Submap Covisibility Handoff =====
  use_handoff: false
  handoff_tail_kfs: 4
  handoff_max_points: 80000
  handoff_min_support: 2
  handoff_opacity_min: 0.20
  handoff_warmup_frames: 20
  handoff_warmup_keyframes: 3
  handoff_new_coverage_th: 0.85
  handoff_depth_consistency_th: 0.08

# ============================================================
# RAP2DGS Lite Configuration (lightweight rule-based handoff scoring)
# ============================================================
RAP2DGSLite:
  enable: false               # Master switch; baseline unchanged when false
  mode: "rule"                # Scoring mode: "rule" only in v1
  use_in_handoff: false       # Replace handoff scoring when true
  fallback_to_original: true  # Fallback to support+opacity on error

  candidate:
    max_candidate_points: 20000          # Hard cap on candidates before scoring
    prefilter_by_support_opacity: true   # Coarse prefilter when over max
    prefilter_max_points: 20000          # Prefilter target

  knn:
    enable: true
    k: 16
    chunk_size: 4096

  features:
    use_support: true
    use_opacity: true
    use_observation: true
    use_area: true
    use_axis_ratio: true
    use_normal: true
    use_density: true
    use_color: false
    use_sh_anisotropy: false

  score_weights:
    support: 0.25
    opacity: 0.20
    observation: 0.20
    area: 0.10
    normal: 0.15
    density: 0.10

  selection:
    keep_percent: 0.25
    min_keep: 1000
    max_keep: 8000

  safety:
    never_prune_active_map: true
    protect_recent_kf: 3
    protect_high_obs: 3
    log_report: true
    report_dir: "rap2dgs_lite_reports"

# ============================================================
# Loop Closure Configuration
# ============================================================
LoopClosure:

  # ===== Stage 0: LoopClosure mode control =====
  mode: verify_only  # choices: off, detect_only, verify_only, keyframe_pgo

  # ===== Stage 2: Keyframe retrieval =====
  keyframe_retrieval_top_k: 10
  keyframe_retrieval_min_score: 0.50
  keyframe_retrieval_min_temporal_gap: 10
  keyframe_retrieval_mutual_nearest: true
  keyframe_retrieval_mutual_top_n: 20

  # ===== Stage 4: Depth verification =====
  depth_verify:
    enabled: true
    min_overlap: 0.20
    max_depth_rmse: 0.06
    min_inlier_ratio: 0.35
    depth_inlier_threshold: 0.10
    scale_search_min: 0.1
    scale_search_max: 20.0
    depth_sample_count: 5000
    scale_search_steps: 10

  # ===== Stage 5: Render refinement =====
  render_refine:
    enabled: false
    max_delta_t_from_odom: 1.0
    max_delta_r_deg_from_odom: 30.0
    max_final_depth_rmse: 0.05
    allow_depth_verified_edge_without_render_refine: true

  # ===== Stage 7: Keyframe PGO safety =====
  keyframe_pgo_odom_info_scale: 10.0
  keyframe_pgo_handoff_info_scale: 5.0
  keyframe_pgo_safety:
    max_correction_t: 1.00
    max_correction_r_deg: 15.0
    max_odom_residual_increase_ratio: 2.00
    min_loop_residual_decrease_ratio: 0.30
    max_single_loop_residual_after_t: 0.30
    max_single_loop_residual_after_r_deg: 5.0
    min_verified_loop_edges: 3
    max_pgo_retries: 2
  pgo_voxel_size: 2.0
  pgo_edge_prune_threshold: 5.0

  # ===== Stage 9: Map correction from keyframe PGO =====
  MapCorrection:
    mode: submap_median_from_keyframes  # choices: none, submap_median_from_keyframes, owner_keyframe
    apply_online: false


  # ===== Basic Parameters =====
  min_interval: 3
  voxel_size: 0.05



  # ===== Reloc3R (future replacement for GSReg+ICP) =====
  Reloc3R:
    enabled: true
    mock_mode: false
    repo_path: third_party/reloc3r
    checkpoint: siyan824/reloc3r-224
    local_checkpoint: weights/reloc3r-224.pth
    image_size: 224
    use_amp: true
    device: cuda
    topk_pairs: 5
    min_valid_pairs: 2
    pair_selection: cosplace_cross_similarity
    scale_mode: init_guess_norm
    depth_scale_check: false
    max_delta_t: 2.0
    max_delta_r_deg: 45.0
    max_pair_rot_std_deg: 15.0
    max_pair_trans_angle_std_deg: 25.0



# ============================================================
# Gaussian Optimization Parameters
# ============================================================
opt_params:
  # ===== Iteration Parameters =====
  iterations: 30000
  densify_from_iter: 500 #当总迭代次iter_count数达到该值时，把gs不透明度重置为0.01
  densify_until_iter: 15000
  densification_interval: 100
  opacity_reset_interval: 3000

  # ===== Learning Rates =====
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.001
  rotation_lr: 0.001

  # ===== Densification Parameters =====
  percent_dense: 0.01
  densify_grad_threshold: 0.0002 #0.0002->0.0006

  # ===== Loss Parameters =====
  lambda_sensor_normal: 0.001
  lambda_dssim: 0.2

# ============================================================
# Model Parameters
# ============================================================
model_params:
  sh_degree: 0
  source_path: ""
  model_path: ""
  resolution: -1
  white_background: False
  data_device: "cuda"

# ============================================================
# Pipeline Parameters
# ============================================================
pipeline_params:
  convert_SHs_python: False
  compute_cov3D_python: False
  depth_ratio: 1.0
  # psedo surface attributes
  # surf depth is either median or expected by setting depth_ratio to 1 or 0
  # for bounded scene, use median depth, i.e., depth_ratio = 1;
  # for unbounded scene, use expected depth, i.e., depth_ration = 0, to reduce disk anliasing.

# ============================================================
# Ablation Switches
# ============================================================
Ablation:
  use_submap: True          # (2) 是否开启子图切图策略 (关闭时退化为全局单地图)
  use_loop_closure: False     # (3)&(4) 是否开启回环检测与全局 PGO 修正
  use_fdn: True              # (5) 是否开启有限差分法线监督及相关 Loss 衰减
  use_fft_mask: True         # (6) 是否开启 FFT 高低频掩膜指导采样与初始尺度设定
  use_error_mask: True       # (6) 是否开启渲染误差掩膜指导动态补点
  use_color_refinement: True   # (8) 是否开启颜色优化（如果开启，则在每次优化迭代中同时优化颜色相关参数；如果关闭，则只优化几何相关参数，颜色参数保持不变）
