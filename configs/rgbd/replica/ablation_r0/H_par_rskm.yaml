# Round H: C + PAR-RSKM — 位姿感知随机关键帧重放 (replica room0)
# 与 C_vo_rskm 唯一差异：rskm_mode=par 替代 vanilla
inherit_from: "configs/rgbd/replica/room0.yaml"

Ablation:
  use_fft_mask: False
  use_submap: False
  use_loop_closure: False
  use_fdn: False
  use_error_mask: False
  use_color_refinement: True

VOPrior:
  type: none
  tracking_refine_iters: 60

Training:
  use_rskm: True
  rskm_mode: par
  rskm_current_frame_interval: 4
  par_rskm_enable_loss_weight: true
  par_rskm_reliability_threshold: 0.05
  par_rskm_gamma: 1.5
  par_rskm_min_weight: 0.25
  par_rskm_max_weight: 1.0
  use_freq_sampling_density: false
  use_rgb_error_mask: false

opt_params:
  use_sa_dist: false
  lambda_dist: 0.0

pipeline_params:
  use_sa: false
  use_sa_depth: false
  depth_ratio: 1.0

Backend:
  optimize_keyframe_pose: true
