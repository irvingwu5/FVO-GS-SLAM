# Round E: D + Error mask + RGB error mask — 渲染误差掩膜动态补点 (fr3_office)
inherit_from: "configs/rgbd/tum/fr3_office.yaml"

Ablation:
  use_fft_mask: True
  use_submap: False
  use_loop_closure: False
  use_fdn: False
  use_error_mask: True
  use_color_refinement: True

VOPrior:
  type: simple_rgbd_odom
  tracking_refine_iters: 60

Training:
  use_rskm: True
  rskm_mode: par
  use_freq_sampling_density: true
  use_rgb_error_mask: true

opt_params:
  use_sa_dist: false
  lambda_dist: 0.0

pipeline_params:
  use_sa: false
  use_sa_depth: false
  depth_ratio: 1.0

Backend:
  optimize_keyframe_pose: true
