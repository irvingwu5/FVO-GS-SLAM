# Round E: B + RSKM only（在 MonoGS baseline 上只加回随机关键帧重放）
inherit_from: "configs/rgbd/tum/base_config.yaml"

Dataset:
  dataset_path: "/home/wuxiangyu/Desktop/data/2d_gaussian_slam/datasets/tum/rgbd_dataset_freiburg3_long_office_household/"
  Calibration:
    fx: 535.4
    fy: 539.2
    cx: 320.1
    cy: 247.6
    k1: 0.0
    k2: 0.0
    p1: 0.0
