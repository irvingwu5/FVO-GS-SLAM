# Round B: All OFF — MonoGS baseline（纯 2DGS 渲染 tracking + median depth）
inherit_from: "configs/rgbd/tum/base_config.yaml"

Dataset:
  dataset_path: "/home/wuxiangyu/Desktop/data/2d_gaussian_slam/datasets/tum/rgbd_dataset_freiburg2_xyz/"
  Calibration:
    fx: 520.90862
    fy: 521.007327
    cx: 325.141442
    cy: 249.701764
    k1: 0.2312
    k2: -0.7849
    p1: -0.0033
    p2: -0.0001
    k3: 0.9172
    distorted: True
    width: 640
    height: 480
    depth_scale: 5000.0

# === MonoGS Baseline: 所有自定义模块关闭，参数还原 ===
Ablation:
  use_submap: False
  use_loop_closure: False
  use_fdn: False
  use_fft_mask: False
  use_error_mask: False

VOPrior:
  type: none            # 关闭 → tracking 回退纯渲染精化（使用 tracking_itr_num=100）

Training:
  use_rskm: False                   # MonoGS 无 RSKM

opt_params:
  lambda_dist: 0.0                  # 关闭 SA depth distortion
  use_sa_dist: false
  lambda_sensor_normal: 0.0         # 关闭 FDN 法向损失

pipeline_params:
  use_sa: false                     # 关闭 surfel-aware 深度
  use_sa_depth: false
  depth_ratio: 1.0                  # MonoGS bounded scene 用 median depth

Backend:
  optimize_keyframe_pose: false     # MonoGS 默认后端不优化 keyframe pose
