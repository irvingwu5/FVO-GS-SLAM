# ============================================================
# Results Configuration
# ============================================================
Results:
  save_results: True
  save_dir: "tum_results"
  save_trj: True
  save_trj_kf_intv: 5
  use_gui: False
  eval_rendering: False
  use_wandb: False

# ============================================================
# Dataset Configuration
# ============================================================
Dataset:
  type: 'tum'
  sensor_type: 'depth'
  pcd_downsample: 128
  pcd_downsample_init: 32
  adaptive_pointsize: True
  point_size: 0.01

# ============================================================
# Training Configuration
# ============================================================
Training:
  # ===== Initialization Parameters =====
  init_itr_num: 1050
  init_gaussian_update: 100
  init_gaussian_reset: 500
  init_gaussian_th: 0.005
  init_gaussian_extent: 30

  # ===== Tracking Parameters =====
  tracking_itr_num: 100

  # ===== Mapping Parameters =====
  mapping_itr_num: 180
  gaussian_update_every: 150
  gaussian_update_offset: 50
  gaussian_th: 0.7
  gaussian_extent: 1.0
  gaussian_reset: 2001
  size_threshold: 20

  # ===== Keyframe Parameters =====
  kf_interval: 5
  kf_translation: 0.08
  kf_min_translation: 0.05
  kf_overlap: 0.9
  kf_cutoff: 0.3

  # ===== Window Parameters =====
  window_size: 10
  pose_window: 5

  # ===== Learning Rate =====
  lr:
    cam_rot_delta: 0.003
    cam_trans_delta: 0.001

  # ===== Other Training Parameters =====
  edge_threshold: 1.1
  rgb_boundary_threshold: 0.01
  alpha: 0.9
  prune_mode: 'slam'
  single_thread: False
  spherical_harmonics: False
  #近景幕布gs+雾片挡相机，限制gs尺寸
  low_freq_scale_multiplier: 1.05
  min_init_gaussian_scale: 0.002
  max_init_gaussian_scale: 0.06

# ============================================================
# FFT VO Configuration
# ============================================================
FFTVO:
  use_fft_vo_init: true
  use_const_speed_candidate: false
  use_previous_candidate: true
  use_fft_vo_candidate: true
  allow_fft_vo_override_pose: true
  disable_fftvo_after_submap_start: true
  fftvo_warmup_frames_after_submap_start: 10
  fftvo_min_improvement_ratio: 0.75
  fftvo_max_delta_t: 0.030
  fftvo_max_delta_deg: 2.0
  fftvo_min_inliers: 250
  fftvo_min_inlier_ratio: 0.70
  enable_pose_feedback: true
  reduce_tracking_iters_when_selected: false
  max_features: 1200
  min_features: 120
  min_tracked: 120
  min_inliers: 100
  min_inlier_ratio: 0.45
  min_depth: 0.1
  max_depth: 5.0
  ransac_reproj_error: 1.5
  ransac_confidence: 0.999
  ransac_iterations: 100
  max_init_translation: 0.08
  max_init_rotation_deg: 5.0
  use_distortion_in_pnp: true
  debug_log: true
  log_candidate_losses: true
  # Tracking iteration control
  selected_tracking_itr_ratio: 0.7
  min_tracking_itr_num: 30

  # Rescue mode: 小步 refinement 选择
  enable_rescue_mode: true
  rescue_trial_iters: 8
  rescue_accept_refined_loss_ratio: 0.99
  rescue_log: true
# ============================================================
# Backend Mapping Configuration (EAGS-style: Gaussian only)
# ============================================================
Backend:
  optimize_keyframe_pose: false
  optimize_keyframe_exposure: false
  backend_pose_sanity_check: true
  backend_restore_pose_if_changed: true
  backend_pose_check_eps_t: 1.0e-8
  backend_pose_check_eps_r_deg: 1.0e-6
  pose_check_log_every: 50

# ============================================================
# Submap Configuration
# ============================================================
Submap:
  # ===== Submap Cut Thresholds (motion-only, relative to submap start frame) =====
  trans_thre: 1.5
  rot_thre: 60
  use_global_seed_submap: true

# ============================================================
# Loop Closure Configuration
# ============================================================
LoopClosure:
  registration_method: "2dgs_hybrid"  # choices: icp, 2dgs_hybrid

  # ===== Basic Parameters =====
  keep_recent_submaps: 3         # 显存中只保留最近 3 个子图
  min_interval: 3
  voxel_size: 0.02
  feature_keep_ratio: 0.30

  # ===== Loop Detection Thresholds =====
  max_loop_delta_translation: 1.5
  max_loop_delta_rotation_deg: 60.0
  icp_fitness_threshold: 0.40

  # ===== PGO Parameters =====
  default_odom_info_scale: 120.0
  global_seed_default_odom_info_scale: 1.0e-3
  recent_query_submaps: 4
  pgo_edge_prune_thres: 0.25

  # PGO protection
  debug_disable_pgo_for_fftvo_test: true
  min_loop_fitness_for_pgo: 0.40
  max_loop_rmse_for_pgo: 0.04
  max_loop_delta_t_for_pgo: 1.5
  max_loop_delta_r_for_pgo: 45.0


# ============================================================
# Gaussian Optimization Parameters
# ============================================================
opt_params:
  # ===== Iteration Parameters =====
  iterations: 30000
  densify_from_iter: 500
  densify_until_iter: 15000
  densification_interval: 100
  opacity_reset_interval: 3000

  # ===== Learning Rates =====
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.001
  rotation_lr: 0.001

  # ===== Densification Parameters =====
  percent_dense: 0.01
  densify_grad_threshold: 0.0002

  # ===== Loss Parameters =====
  lambda_sensor_normal: 0.001
  lambda_dssim: 0.2

# ============================================================
# Model Parameters
# ============================================================
model_params:
  sh_degree: 0
  source_path: ""
  model_path: ""
  resolution: -1
  white_background: False
  data_device: "cuda"

# ============================================================
# Pipeline Parameters
# ============================================================
pipeline_params:
  convert_SHs_python: False
  compute_cov3D_python: False
  depth_ratio: 1.0
  # psedo surface attributes
  # surf depth is either median or expected by setting depth_ratio to 1 or 0
  # for bounded scene, use median depth, i.e., depth_ratio = 1;
  # for unbounded scene, use expected depth, i.e., depth_ration = 0, to reduce disk anliasing.

# ============================================================
# Ablation Switches
# ============================================================
Ablation:
  use_submap: True         # (2) 是否开启子图切图策略 (关闭时退化为全局单地图)
  use_loop_closure: True    # (3)&(4) 是否开启回环检测与全局 PGO 修正
  use_fdn: True              # (5) 是否开启有限差分法线监督及相关 Loss 衰减
  use_fft_mask: True         # (6) 是否开启 FFT 高低频掩膜指导采样与初始尺度设定
  use_error_mask: True        # (6) 是否开启渲染误差掩膜指导动态补点
  use_color_refinement: True   # (8) 是否开启颜色优化（如果开启，则在每次优化迭代中同时优化颜色相关参数；如果关闭，则只优化几何相关参数，颜色参数保持不变）
