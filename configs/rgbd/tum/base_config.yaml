## SLAM parameters
Results:
  save_results: True
  save_dir: "tum_results"
  save_trj: True
  save_trj_kf_intv: 5
  use_gui: True
  eval_rendering: False
  use_wandb: False

Dataset:
  type: 'tum'
  sensor_type: 'depth'
  pcd_downsample: 128
  pcd_downsample_init: 32
  adaptive_pointsize: True
  point_size: 0.01

Training:
  #Initialization
  init_itr_num: 1050
  init_gaussian_update: 100
  init_gaussian_reset: 500
  init_gaussian_th: 0.005
  init_gaussian_extent: 30
  # Tracking and Mapping
  tracking_itr_num: 100 #100->200
  mapping_itr_num: 150 #150-->250
  gaussian_update_every: 150
  gaussian_update_offset: 50
  gaussian_th: 0.7
  gaussian_extent: 1.0
  gaussian_reset: 2001
  size_threshold: 20 #20->80
  kf_interval: 5 #5->10
  window_size: 8
  pose_window: 3 #3->8
  edge_threshold: 1.1
  rgb_boundary_threshold: 0.01
  alpha: 0.9
  kf_translation: 0.08
  kf_min_translation: 0.05
  kf_overlap: 0.9 #0.8->0.6要求 95% 重叠才视为“相同视角”。该值越高，判定为“不同视角”的帧越多（会产生更多关键帧）；值越低，则关键帧更稀疏
  kf_cutoff: 0.3
  prune_mode: 'slam'
  single_thread: False
  spherical_harmonics: False
  lr:
    cam_rot_delta: 0.003
    cam_trans_delta: 0.001

Submap:
  trans_thre: 2.0
  rot_thre: 90
  # ========== 新增：真正独立子图模式 ==========
  true_independent_submap: True   # true=彻底清空旧地图，false=保留部分旧点（流式）
  # ===========================================
  # 以下参数仅在 true_independent_submap: false 时生效
  use_critical_point_selection: true
  selection_strategy: simple
  retention_ratio: 0.30
  num_spatial_clusters: 10
  seed_init_iters: 700
  enable_cut_local_ba: true
  cut_local_ba_iters: 40
  cut_local_prune_iters: 8
  cut_refine_iters: 20

# 【改进】：显存管理参数
MemoryManagement:
  # 每次子图切分后强制释放显存缓存
  empty_cache_on_submap_cut: true
  # 渲染时的临时张量复用策略
  reuse_render_tensors: true
  # 关键帧窗口大小（影响显存占用）
  keyframe_window_size: 10  # 推荐 5-15
  # 梯度累积窗口（影响显存占用）
  gradient_accumulation_frames: 5


LoopClosure:
  max_search_range: 5 #限制参与位姿图优化（PGO）的最近子图数量，控制搜索范围、计算量和内存占用
  max_loop_delta_translation: 0.80
  max_loop_delta_rotation_deg: 45.0
  icp_fitness_threshold: 0.60

  adjacent_icp_fitness_threshold: 0.45
  adjacent_icp_rmse_threshold: 0.03
  max_adjacent_delta_translation: 0.25
  max_adjacent_delta_rotation_deg: 12.0
  default_odom_info_scale: 120.0

  enable_chain_pgo_without_loop: true
  chain_pgo_window: 4
  recent_query_submaps: 2

  pgo_edge_prune_thres: 0.25
  min_interval: 3
  voxel_size: 0.05

## 3DGS default parameters
opt_params:
  iterations: 30000
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.001
  rotation_lr: 0.001
  percent_dense: 0.01
  lambda_sensor_normal: 0.001
  lambda_dssim: 0.2
  densification_interval: 100
  opacity_reset_interval: 3000 #3000->6000
  densify_from_iter: 500
  densify_until_iter: 15000
  densify_grad_threshold: 0.0002 #0.0002->0.0008

model_params:
  sh_degree: 0
  source_path: ""
  model_path: ""
  resolution: -1
  white_background: False
  data_device: "cuda"

pipeline_params:
  convert_SHs_python: False
  compute_cov3D_python: False
  depth_ratio: 1.0
  # psedo surface attributes
  # surf depth is either median or expected by setting depth_ratio to 1 or 0
  # for bounded scene, use median depth, i.e., depth_ratio = 1;
  # for unbounded scene, use expected depth, i.e., depth_ration = 0, to reduce disk anliasing.
Ablation:
  use_submap: True         # (2) 是否开启子图切图策略 (关闭时退化为全局单地图)
  use_loop_closure: True    # (3)&(4) 是否开启回环检测与全局 PGO 修正
  use_fdn: True              # (5) 是否开启有限差分法线监督及相关 Loss 衰减
  use_fft_mask: True         # (6) 是否开启 FFT 高低频掩膜指导采样与初始尺度设定
  use_error_mask: True        # (6) 是否开启渲染误差掩膜指导动态补点
  use_color_refinement: True   # (8) 是否开启颜色优化（如果开启，则在每次优化迭代中同时优化颜色相关参数；如果关闭，则只优化几何相关参数，颜色参数保持不变）