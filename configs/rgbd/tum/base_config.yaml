## SLAM parameters
Results:
  save_results: True
  save_dir: "ablation_results"
  save_trj: True
  save_trj_kf_intv: 5
  use_gui: True
  eval_rendering: False
  use_wandb: False

Dataset:
  type: 'tum'
  sensor_type: 'depth'
  pcd_downsample: 128
  pcd_downsample_init: 32
  adaptive_pointsize: True
  point_size: 0.01
  use_label: True

Training:
  #Initialization
  init_itr_num: 1050
  init_gaussian_update: 100
  init_gaussian_reset: 500
  init_gaussian_th: 0.005
  init_gaussian_extent: 30
  # Tracking and Mapping
  tracking_itr_num: 100 #100->200
  mapping_itr_num: 150 #150-->250
  gaussian_update_every: 150
  gaussian_update_offset: 50
  gaussian_th: 0.7
  gaussian_extent: 1.0
  gaussian_reset: 2001
  size_threshold: 20 #20->80
  kf_interval: 5 #5->10
  window_size: 8
  pose_window: 3 #3->8
  edge_threshold: 1.1
  rgb_boundary_threshold: 0.01
  alpha: 0.9
  kf_translation: 0.08
  kf_min_translation: 0.05
  kf_overlap: 0.9 #0.8->0.6要求 95% 重叠才视为“相同视角”。该值越高，判定为“不同视角”的帧越多（会产生更多关键帧）；值越低，则关键帧更稀疏
  kf_cutoff: 0.3
  prune_mode: 'slam'
  single_thread: False
  spherical_harmonics: False
  lr:
    cam_rot_delta: 0.003
    cam_trans_delta: 0.001
  sagsslam:
    use_external_normal: True
    use_surf_normal: False
    use_distortion_loss: False
    # 互斥选择: "sensor", "plane", "mixed"
    #sensor_depthnomal_supervision、plane_normal_supervision、mixed_normal_supervision
    normal_mode: "sensor"
    use_plane_constraint: False
    loss_type: "Huber"  # "l1" or "l2"
    warmup_iter: 2500
Submap:
  trans_thre: 1.5     # 平移切图阈值(米)
  rot_thre: 60           # 旋转切图阈值(度)
LoopClosure:
  enable: True
  min_interval: 2        # 触发闭环的最小子图间隔
  voxel_size: 0.02

## 3DGS default parameters
opt_params:
  iterations: 30000
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.001
  rotation_lr: 0.001
  percent_dense: 0.01
  lambda_surf_normal: 0.01
  lambda_sensor_normal: 0.001
  lambda_plane: 15.0
  lambda_dssim: 0.2
  lambda_dist: 100.0
  densification_interval: 100
  opacity_reset_interval: 3000 #3000->6000
  densify_from_iter: 500
  densify_until_iter: 15000
  densify_grad_threshold: 0.0002 #0.0002->0.0008

model_params:
  sh_degree: 0
  source_path: ""
  model_path: ""
  resolution: -1
  white_background: False
  data_device: "cuda"

pipeline_params:
  convert_SHs_python: False
  compute_cov3D_python: False
  depth_ratio: 1.0
  # psedo surface attributes
  # surf depth is either median or expected by setting depth_ratio to 1 or 0
  # for bounded scene, use median depth, i.e., depth_ratio = 1;
  # for unbounded scene, use expected depth, i.e., depth_ration = 0, to reduce disk anliasing.
